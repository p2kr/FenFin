version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: expense-db
    environment:
      POSTGRES_USER: ${DB_USER:-expenses}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-expenses}
    volumes:
      - ${DB_VOLUME_PATH:-pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: prince.azurecr.io/expense-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    ports:
      - "127.0.0.1:8080:8080" # Bound to localhost to prevent external access
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME:-expenses}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-expenses}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: prince.azurecr.io/expense-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-frontend
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
