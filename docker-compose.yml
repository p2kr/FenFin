version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: expense-db
    environment:
      POSTGRES_USER: expenses
      POSTGRES_PASSWORD: password
      POSTGRES_DB: expenses
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/expenses
      - SPRING_DATASOURCE_USERNAME=expenses
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
